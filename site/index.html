function attach(){
  app.querySelectorAll('[data-lang]').forEach(b=> b.addEventListener('click', ()=> setLang(b.getAttribute('data-lang'))));
  const burger = document.getElementById('burger');
  const menu = document.getElementById('mobilemenu');
  if(burger && menu){ burger.addEventListener('click', ()=> menu.classList.toggle('open')); }
  app.querySelectorAll('.mm-link').forEach(a=> a.addEventListener('click', ()=> menu && menu.classList.remove('open')));
  app.querySelectorAll('.galbtn').forEach(b=> b.addEventListener('click', ()=> openLb(parseInt(b.getAttribute('data-idx'),10))));
  const form = document.getElementById('enquiry');
  if(form) form.addEventListener('submit', handleSubmit);
}

function setLang(l){
  if(l===lang) return;
  lang = l;
  try{ localStorage.setItem('ingot_lang', l); }catch(e){}
  document.documentElement.lang = l;
  render();
}

function initReveal(){
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.style.opacity='1'; en.target.style.transform='none'; io.unobserve(en.target); } });
  }, { threshold:0.1, rootMargin:'0px 0px -40px 0px' });
  app.querySelectorAll('[data-reveal]').forEach(el=>{
    el.style.opacity='0'; el.style.transform='translateY(20px)';
    el.style.transition='opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1)';
    io.observe(el);
  });
}

/* ---- lightbox ---- */
function openLb(i){ lbIndex=i; renderLb(); }
function closeLb(){ lbIndex=null; renderLb(); }
function nextImg(){ if(lbIndex===null) return; lbIndex=(lbIndex+1)%GALLERY.length; renderLb(); }
function prevImg(){ if(lbIndex===null) return; lbIndex=(lbIndex-1+GALLERY.length)%GALLERY.length; renderLb(); }
function renderLb(){
  if(lbIndex===null){ lbEl.innerHTML=''; document.body.style.overflow=''; return; }
  document.body.style.overflow='hidden';
  const g = GALLERY[lbIndex];
  const cap = g[lang];
  lbEl.innerHTML = `
  <div id="lbOverlay" style="position:fixed;inset:0;z-index:100;background:rgba(18,17,15,.95);display:flex;align-items:center;justify-content:center;padding:clamp(14px,4vw,56px);">
    <button class="lb-close" id="lbClose" aria-label="Close" style="position:absolute;top:18px;right:22px;background:none;border:none;color:#e7e3da;font-size:30px;line-height:1;cursor:pointer;">✕</button>
    <button class="lb-arrow" id="lbPrev" aria-label="Prev" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#f1eee7;width:48px;height:48px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;">‹</button>
    <button class="lb-arrow" id="lbNext" aria-label="Next" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#f1eee7;width:48px;height:48px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;">›</button>
    <figure id="lbFig" style="margin:0;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:1120px;">
      <img src="${g.src}" alt="${cap}" style="max-height:80vh;max-width:88vw;width:auto;object-fit:contain;border-radius:3px;" />
      <figcaption style="display:flex;align-items:center;gap:16px;">
        <span style="font-size:14px;color:#cfccc4;">${cap}</span>
        <span style="${SS};font-size:12px;letter-spacing:.1em;color:#e08a5e;">${lbIndex+1} / ${GALLERY.length}</span>
      </figcaption>
    </figure>
  </div>`;
  document.getElementById('lbOverlay').addEventListener('click', closeLb);
  document.getElementById('lbClose').addEventListener('click', (e)=>{ e.stopPropagation(); closeLb(); });
  document.getElementById('lbPrev').addEventListener('click', (e)=>{ e.stopPropagation(); prevImg(); });
  document.getElementById('lbNext').addEventListener('click', (e)=>{ e.stopPropagation(); nextImg(); });
  document.getElementById('lbFig').addEventListener('click', (e)=> e.stopPropagation());
}
window.addEventListener('keydown', (e)=>{
  if(lbIndex===null) return;
  if(e.key==='Escape') closeLb();
  else if(e.key==='ArrowRight') nextImg();
  else if(e.key==='ArrowLeft') prevImg();
});

/* ---- form ---- */
async function handleSubmit(e){
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  if(data.get('_gotcha')) return;
  const t = DICT[lang];
  const btn = document.getElementById('submitBtn');
  if(btn){ btn.disabled = true; btn.textContent = t.booking.f.sending; btn.style.opacity = '.7'; btn.style.cursor='default'; }
  let ok = false;
  try{
    const res = await fetch(FORMSPREE, { method:'POST', body:data, headers:{ 'Accept':'application/json' } });
    ok = res.ok;
  }catch(err){ ok = false; }
  const wrap = document.getElementById('formWrap');
  if(!wrap) return;
  if(ok){
    wrap.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;padding:clamp(20px,3vw,40px) 0;">
      <svg width="42" height="42" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10.5" fill="none" stroke="#7E8769" stroke-width="1.2"/><path d="M6.5 11.2 L9.5 14.2 L15.5 7.5" fill="none" stroke="#7E8769" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h3 style="${SS};font-weight:700;font-size:26px;color:#23221F;margin:6px 0 0;">${t.booking.successTitle}</h3>
      <p style="font-size:16px;line-height:1.6;color:#56534c;margin:0;">${t.booking.successBody}</p>
    </div>`;
  } else {
    if(btn){ btn.disabled=false; btn.textContent=t.booking.f.submit; btn.style.opacity='1'; btn.style.cursor='pointer'; }
    let err = document.getElementById('formErr');
    if(!err){
      err = document.createElement('p');
      err.id = 'formErr';
      err.style.cssText = "grid-column:1/-1;margin:0;font-size:14px;line-height:1.5;color:#BF562E;";
      form.appendChild(err);
    }
    err.innerHTML = `<strong>${t.booking.errorTitle}</strong> ${t.booking.errorBody}`;
  }
}

/* ---- init ---- */
(function(){
  try{
    const s = localStorage.getItem('ingot_lang');
    if(s==='cs'||s==='en') lang = s;
  }catch(e){}
  document.documentElement.lang = lang;
  render();
})();
</script>
