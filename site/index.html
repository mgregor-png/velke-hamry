    </div>
  </footer>
  <a href="#rezervace" id="stickyCta" class="cta" style="position:fixed;left:12px;right:12px;bottom:12px;z-index:55;text-align:center;background:#BF562E;color:#F1EEE7;${SS};font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:15px;border-radius:4px;text-decoration:none;box-shadow:0 8px 24px rgba(0,0,0,.28);">${t.nav.cta}</a>`;

  attach();
  initReveal();
}

function attach(){
  app.querySelectorAll('[data-lang]').forEach(b=> b.addEventListener('click', ()=> setLang(b.getAttribute('data-lang'))));
  const burger = document.getElementById('burger');
  const menu = document.getElementById('mobilemenu');
  if(burger && menu){ burger.addEventListener('click', ()=> menu.classList.toggle('open')); }
  app.querySelectorAll('.mm-link').forEach(a=> a.addEventListener('click', ()=> menu && menu.classList.remove('open')));
  app.querySelectorAll('.galbtn').forEach(b=> b.addEventListener('click', ()=> openLb(parseInt(b.getAttribute('data-idx'),10))));
  if(so) window.removeEventListener('scroll', so);
  const sticky=document.getElementById('stickyCta'), rezSec=document.getElementById('rezervace');
  if(sticky && rezSec){ so=()=>{ const r=rezSec.getBoundingClientRect(); sticky.classList.toggle('hide', r.top < window.innerHeight*0.6); }; window.addEventListener('scroll', so, {passive:true}); so(); }
  const form = document.getElementById('enquiry');
  if(form){
    form.addEventListener('submit', handleSubmit);
    if(form.guests) form.guests.addEventListener('change', recalc);
    syncDateInputs();
    renderCal();
    recalc();
  }
}

function setLang(l){
  if(l===lang) return;
  lang = l;
  try{ localStorage.setItem('ingot_lang', l); }catch(e){}
  document.documentElement.lang = l;
  render();
}

function initReveal(){
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.style.opacity='1'; en.target.style.transform='none'; io.unobserve(en.target); } });
  }, { threshold:0.1, rootMargin:'0px 0px -40px 0px' });
  app.querySelectorAll('[data-reveal]').forEach(el=>{
    el.style.opacity='0'; el.style.transform='translateY(20px)';
    el.style.transition='opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1)';
    io.observe(el);
  });
}

/* ---- lightbox ---- */
function openLb(i){ lbIndex=i; renderLb(); }
function closeLb(){ lbIndex=null; renderLb(); }
function nextImg(){ if(lbIndex===null) return; lbIndex=(lbIndex+1)%GALLERY.length; renderLb(); }
function prevImg(){ if(lbIndex===null) return; lbIndex=(lbIndex-1+GALLERY.length)%GALLERY.length; renderLb(); }
function renderLb(){
  if(lbIndex===null){ lbEl.innerHTML=''; document.body.style.overflow=''; return; }
  document.body.style.overflow='hidden';
  const g = GALLERY[lbIndex];
  const cap = g[lang];
  lbEl.innerHTML = `
  <div id="lbOverlay" style="position:fixed;inset:0;z-index:100;background:rgba(18,17,15,.95);display:flex;align-items:center;justify-content:center;padding:clamp(14px,4vw,56px);">
    <button class="lb-close" id="lbClose" aria-label="Close" style="position:absolute;top:18px;right:22px;background:none;border:none;color:#e7e3da;font-size:30px;line-height:1;cursor:pointer;">✕</button>
    <button class="lb-arrow" id="lbPrev" aria-label="Prev" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#f1eee7;width:48px;height:48px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;">‹</button>
    <button class="lb-arrow" id="lbNext" aria-label="Next" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#f1eee7;width:48px;height:48px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;">›</button>
    <figure id="lbFig" style="margin:0;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:1120px;">
      <img src="${g.src}" alt="${cap}" style="max-height:80vh;max-width:88vw;width:auto;object-fit:contain;border-radius:3px;" />
      <figcaption style="display:flex;align-items:center;gap:16px;">
        <span style="font-size:14px;color:#cfccc4;">${cap}</span>
        <span style="${SS};font-size:12px;letter-spacing:.1em;color:#e08a5e;">${lbIndex+1} / ${GALLERY.length}</span>
      </figcaption>
    </figure>
  </div>`;
  document.getElementById('lbOverlay').addEventListener('click', closeLb);
  document.getElementById('lbClose').addEventListener('click', (e)=>{ e.stopPropagation(); closeLb(); });
  document.getElementById('lbPrev').addEventListener('click', (e)=>{ e.stopPropagation(); prevImg(); });
  document.getElementById('lbNext').addEventListener('click', (e)=>{ e.stopPropagation(); nextImg(); });
  document.getElementById('lbFig').addEventListener('click', (e)=> e.stopPropagation());
}
window.addEventListener('keydown', (e)=>{
  if(lbIndex===null) return;
  if(e.key==='Escape') closeLb();
  else if(e.key==='ArrowRight') nextImg();
  else if(e.key==='ArrowLeft') prevImg();
});

/* ---- pricing: direct price = Previo price minus the agency fee; live data from availability.json ---- */
const DISCOUNT = 0.12;       // how much cheaper than Previo (we skip the agency fee). Tune this one number.
const CLEAN_BASE = 600;      // cleaning: base
const CLEAN_PP = 150;        // cleaning: per guest
const FALLBACK_NIGHT = 1800; // used only when a night has no scraped Previo price
const MIN_NIGHTS = 2;
let BOOKED = [];             // ['YYYY-MM-DD'] booked nights (from the 4-hourly Previo scrape)
let PRICEMAP = {};           // { 'YYYY-MM-DD': previo nightly price }
function isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtCZK(n){ return n.toLocaleString('cs-CZ').replace(/ /g,' ')+' Kč'; }
function nightsLabel(n){ if(lang==='en') return n===1?'night':'nights'; if(n===1) return 'noc'; if(n>=2&&n<=4) return 'noci'; return 'nocí'; }
function recalc(){
  const form = document.getElementById('enquiry'), box = document.getElementById('priceBox');
  if(!form || !box) return;
  const p = DICT[lang].booking.price;
  const a = form.arrival ? form.arrival.value : '', d = form.departure ? form.departure.value : '';
  if(!a || !d){ box.innerHTML = `<span style="color:#9a958b;font-size:13px;line-height:1.5;">${p.pick}</span>`; return; }
  const start = new Date(a+'T00:00:00'), end = new Date(d+'T00:00:00');
  const nights = Math.round((end-start)/86400000);
  if(isNaN(nights) || nights<=0){ box.innerHTML = `<span style="color:#BF562E;font-size:13px;">${p.range}</span>`; return; }
  let previoNights=0, ourNights=0, allPriced=true;
  for(let i=0;i<nights;i++){
    const dt=new Date(start); dt.setDate(dt.getDate()+i); const key=isoDate(dt);
    if(BOOKED.indexOf(key)!==-1){ box.innerHTML = `<span style="color:#BF562E;font-size:13px;">${p.unavail}</span>`; return; }
    let pv = PRICEMAP[key]; if(pv==null){ allPriced=false; pv=FALLBACK_NIGHT; }
    previoNights += pv; ourNights += Math.round(pv*(1-DISCOUNT));
  }
  const guests = form.guests ? (parseInt(form.guests.value,10)||1) : 1;
  const cleaning = CLEAN_BASE + CLEAN_PP*guests;
  const ourTotal = ourNights + cleaning, previoTotal = previoNights + cleaning;
  const pct = Math.round((1 - ourTotal/previoTotal)*100);
  const showDeal = allPriced && pct>=1;
  const minNote = nights<MIN_NIGHTS ? `<div style="color:#BF562E;font-size:12.5px;margin-top:6px;">${p.min.replace('{n}',MIN_NIGHTS)}</div>` : '';
  const badge = showDeal ? `<span style="display:inline-block;border:1px solid #BF562E;color:#BF562E;${SS};font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:999px;margin-bottom:9px;">${p.off.replace('{n}',pct)}</span>` : '';
  const strike = showDeal ? `<span style="font-size:12px;color:#a39e94;margin-right:5px;">${p.elsewhere}</span><span style="font-size:15px;color:#a39e94;text-decoration:line-through;margin-right:9px;">${fmtCZK(previoTotal)}</span>` : '';
  box.innerHTML = `
    ${badge}
    <div style="display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;">
      ${strike}
      <span style="${SS};font-size:13px;color:#7a766c;">${p.from}</span>
      <span style="${SS};font-weight:700;font-size:28px;color:#BF562E;letter-spacing:-.01em;">${fmtCZK(ourTotal)}</span>
    </div>
    <div style="font-size:13px;color:#7a766c;margin-top:3px;">${nights} ${nightsLabel(nights)} · ${p.inclCleaning}</div>
    ${minNote}
    <div style="font-size:12.5px;line-height:1.5;color:#9a6b4d;margin-top:7px;">${p.note}</div>`;
}

/* ---- availability calendar (custom range picker; greys past + booked dates) ---- */
const MONTHS_CS=['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WD_CS=['Po','Út','St','Čt','Pá','So','Ne'], WD_EN=['Mo','Tu','We','Th','Fr','Sa','Su'];
let calBase=(function(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);})();
let selA=null, selD=null;
function fmtHuman(iso){ const a=iso.split('-'); return (+a[2])+'. '+(+a[1])+'. '+a[0]; }
function syncDateInputs(){
  const ai=document.getElementById('arrival'), di=document.getElementById('departure');
  const ad=document.getElementById('arrInput'), dd=document.getElementById('depInput');
  if(ai) ai.value=selA||''; if(di) di.value=selD||'';
  if(ad) ad.value=selA?fmtHuman(selA):''; if(dd) dd.value=selD?fmtHuman(selD):'';
}
function renderCal(){
  const cont=document.getElementById('calendar'); if(!cont) return;
  const y=calBase.getFullYear(), m=calBase.getMonth();
  const monthName=(lang==='en'?MONTHS_EN:MONTHS_CS)[m];
  const wds=lang==='en'?WD_EN:WD_CS;
  const startWd=(new Date(y,m,1).getDay()+6)%7;
  const daysIn=new Date(y,m+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0); const todayIso=isoDate(today);
  let cells='';
  for(let i=0;i<startWd;i++) cells+='<div></div>';
  for(let d=1;d<=daysIn;d++){
    const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    let cls='cal-d', attr='';
    if(iso<todayIso) cls+=' past';
    else if(BOOKED.indexOf(iso)!==-1) cls+=' off';
    else { cls+=' avail'; attr='data-iso="'+iso+'"';
      if(iso===selA||iso===selD) cls+=' end';
      else if(selA&&selD&&iso>selA&&iso<selD) cls+=' mid'; }
    cells+='<div class="'+cls+'" '+attr+'>'+d+'</div>';
  }
  const cf=new Date(); const curFirst=new Date(cf.getFullYear(),cf.getMonth(),1);
  const prevDisabled = calBase<=curFirst;
  let booked60=0; for(let i=0;i<60;i++){ const dt=new Date(today.getTime()+i*86400000); if(BOOKED.indexOf(isoDate(dt))!==-1) booked60++; }
  const pr=DICT[lang].booking.price;
  const scar = booked60>0 ? ((booked60>=18?'<strong style="color:#BF562E;font-weight:600;">'+pr.filling+'</strong> ':'')+pr.legend) : '';
  cont.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'+
      '<button type="button" class="cal-nav" id="calPrev"'+(prevDisabled?' disabled':'')+'>&#8249;</button>'+
      '<span style="'+SS+';font-weight:600;font-size:14px;color:#23221F;">'+monthName+' '+y+'</span>'+
      '<button type="button" class="cal-nav" id="calNext">&#8250;</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;">'+wds.map(w=>'<div style="text-align:center;font-size:11px;color:#9a958b;'+SS+';">'+w+'</div>').join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">'+cells+'</div>'+
    (scar?'<div style="font-size:11.5px;line-height:1.5;color:#9a958b;margin-top:9px;">'+scar+'</div>':'');
  cont.querySelectorAll('.cal-d.avail').forEach(el=>el.addEventListener('click',()=>pickDay(el.getAttribute('data-iso'))));
  const pv=document.getElementById('calPrev'), nx=document.getElementById('calNext');
  if(pv&&!prevDisabled) pv.addEventListener('click',()=>{calBase=new Date(y,m-1,1);renderCal();});
  if(nx) nx.addEventListener('click',()=>{calBase=new Date(y,m+1,1);renderCal();});
}
function pickDay(iso){
  if(!selA || (selA&&selD)){ selA=iso; selD=null; }
  else if(iso>selA){
    let ok=true, dt=new Date(selA+'T00:00:00'); const end=new Date(iso+'T00:00:00');
    while(dt<end){ if(BOOKED.indexOf(isoDate(dt))!==-1){ ok=false; break; } dt.setDate(dt.getDate()+1); }
    if(ok) selD=iso; else { selA=iso; selD=null; }
  } else { selA=iso; selD=null; }
  syncDateInputs(); renderCal(); recalc();
}

/* ---- form ---- */
async function handleSubmit(e){
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  if(data.get('_gotcha')) return;
  const _a=form.arrival&&form.arrival.value, _d=form.departure&&form.departure.value;
  if(!_a||!_d){ recalc(); const c=document.getElementById('calendar'); if(c) c.scrollIntoView({behavior:'smooth',block:'center'}); return; }
  { const s=new Date(_a+'T00:00:00'),en=new Date(_d+'T00:00:00'),n=Math.round((en-s)/86400000);
    for(let i=0;i<n;i++){ const dt=new Date(s); dt.setDate(dt.getDate()+i); if(BOOKED.indexOf(isoDate(dt))!==-1){ recalc(); return; } } }
  const t = DICT[lang];
  const btn = document.getElementById('submitBtn');
  if(btn){ btn.disabled = true; btn.textContent = t.booking.f.sending; btn.style.opacity = '.7'; btn.style.cursor='default'; }
  let ok = false;
  try{
    const res = await fetch(FORMSPREE, { method:'POST', body:data, headers:{ 'Accept':'application/json' } });
    ok = res.ok;
  }catch(err){ ok = false; }
  const wrap = document.getElementById('formWrap');
  if(!wrap) return;
  if(ok){
    wrap.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;padding:clamp(20px,3vw,40px) 0;">
      <svg width="42" height="42" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10.5" fill="none" stroke="#7E8769" stroke-width="1.2"/><path d="M6.5 11.2 L9.5 14.2 L15.5 7.5" fill="none" stroke="#7E8769" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h3 style="${SS};font-weight:700;font-size:26px;color:#23221F;margin:6px 0 0;">${t.booking.successTitle}</h3>
      <p style="font-size:16px;line-height:1.6;color:#56534c;margin:0;">${t.booking.successBody}</p>
    </div>`;
  } else {
    if(btn){ btn.disabled=false; btn.textContent=t.booking.f.submit; btn.style.opacity='1'; btn.style.cursor='pointer'; }
    let err = document.getElementById('formErr');
    if(!err){
      err = document.createElement('p');
      err.id = 'formErr';
      err.style.cssText = "grid-column:1/-1;margin:0;font-size:14px;line-height:1.5;color:#BF562E;";
      form.appendChild(err);
    }
    err.innerHTML = `<strong>${t.booking.errorTitle}</strong> ${t.booking.errorBody}`;
  }
}

/* ---- init ---- */
(function(){
  try{
    const s = localStorage.getItem('ingot_lang');
    if(s==='cs'||s==='en') lang = s;
  }catch(e){}
  document.documentElement.lang = lang;
  document.addEventListener('click', (e)=>{
    const a = e.target.closest ? e.target.closest('a[href^="#"]') : null;
    if(!a) return;
    const id = a.getAttribute('href').slice(1); if(!id) return;
    const el = document.getElementById(id); if(!el) return;
    e.preventDefault();
    const mm=document.getElementById('mobilemenu'); if(mm) mm.classList.remove('open');
    const target=()=>Math.max(0, el.getBoundingClientRect().top + window.scrollY - 70);
    window.scrollTo({top:target(), behavior:'smooth'});
    setTimeout(()=>{ const t=target(); if(Math.abs(window.scrollY-t)>4) window.scrollTo({top:t, behavior:'auto'}); }, 650);
  });
  render();
  fetch('availability.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(j=>{ if(j){ if(Array.isArray(j.booked)) BOOKED=j.booked; if(j.prices) PRICEMAP=j.prices; renderCal(); recalc(); } }).catch(()=>{});
})();

/* ---- analytics + cookie consent ---- */
const CF_TOKEN = ""; // Cloudflare Web Analytics token (cookieless, privacy-first - NO consent banner needed). Enable in Cloudflare dashboard > Web Analytics, paste the token here.
const GA_ID = "";    // Google Analytics 4 id, e.g. "G-XXXXXXX" (cookie-based -> auto-shows the consent banner). Leave empty to keep GA off.
if(CF_TOKEN){ const s=document.createElement('script'); s.defer=true; s.src='https://static.cloudflareinsights.com/beacon.min.js'; s.setAttribute('data-cf-beacon', JSON.stringify({token:CF_TOKEN})); document.head.appendChild(s); }
function loadGA(){ if(!GA_ID||window.__ga) return; window.__ga=true; const s=document.createElement('script'); s.async=true; s.src='https://www.googletagmanager.com/gtag/js?id='+GA_ID; document.head.appendChild(s); window.dataLayer=window.dataLayer||[]; window.gtag=function(){dataLayer.push(arguments);}; gtag('js', new Date()); gtag('config', GA_ID, {anonymize_ip:true}); }
(function(){
  if(!GA_ID) return;
  let c=null; try{ c=localStorage.getItem('ingot_consent'); }catch(e){}
  if(c==='yes'){ loadGA(); return; }
  if(c==='no') return;
  const el=document.getElementById('consent'); if(!el) return;
  const cs = (document.documentElement.lang==='en')
    ? {t:'We use cookies for anonymous visitor statistics.', a:'Accept', d:'Decline'}
    : {t:'Používáme cookies pro anonymní statistiky návštěvnosti.', a:'Přijmout', d:'Odmítnout'};
  document.getElementById('consentText').textContent=cs.t;
  document.getElementById('consentAcc').textContent=cs.a;
  document.getElementById('consentDec').textContent=cs.d;
  el.classList.add('show');
  document.getElementById('consentAcc').onclick=function(){ try{localStorage.setItem('ingot_consent','yes');}catch(e){} el.classList.remove('show'); loadGA(); };
  document.getElementById('consentDec').onclick=function(){ try{localStorage.setItem('ingot_consent','no');}catch(e){} el.classList.remove('show'); };
})();
